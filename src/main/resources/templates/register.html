<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel auth-panel--wide">
        <a class="auth-panel__back" th:href="@{/}">Winter Olympics</a>
        <h1>Athlete Registration</h1>

        <p class="message message--error" th:if="${registrationError}" th:text="${registrationError}"></p>

        <form class="auth-form auth-form--grid" th:action="@{/register}" th:object="${userRegisterDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field">
                <label for="username">Username</label>
                <input id="username" th:field="*{username}" type="text" autocomplete="username" required>
                <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
            </div>

            <div class="form-field">
                <label for="fullName">Full name</label>
                <input id="fullName" th:field="*{fullName}" type="text" autocomplete="name" required>
                <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div class="form-field">
                <label for="country">Country</label>
                <input id="country" th:field="*{country}" type="text" autocomplete="country-name" required>
                <p class="field-error" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></p>
            </div>

            <div class="form-field">
                <label for="gender">Gender</label>
                <select id="gender" th:field="*{gender}" required>
                    <option value="">Select gender</option>
                    <option th:each="genderOption : ${genders}"
                            th:value="${genderOption}"
                            th:text="${genderOption}">
                    </option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
            </div>

            <div class="form-field">
                <label for="dateOfBirth">Date of birth</label>
                <input id="dateOfBirth" th:field="*{dateOfBirth}" type="date" required>
                <p class="field-error" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></p>
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required>
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <div class="form-field">
                <label for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required>
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
            </div>

            <button class="button button--primary form-submit" type="submit">Register</button>
        </form>

        <p class="auth-panel__footer">
            Already registered?
            <a th:href="@{/login}">Login</a>
        </p>
    </section>
</main>
</body>
</html>
