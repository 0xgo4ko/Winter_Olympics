<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <a class="auth-panel__back" th:href="@{/}">Winter Olympics</a>
        <h1>Login</h1>

        <p class="message message--success" th:if="${registrationSuccess}" th:text="${registrationSuccess}"></p>
        <p class="message message--error" th:if="${param.error}">Invalid username or password.</p>
        <p class="message message--success" th:if="${param.logout}">You have been logged out.</p>

        <form class="auth-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button class="button button--primary" type="submit">Login</button>
        </form>

        <p class="auth-panel__footer">
            New athlete?
            <a th:href="@{/register}">Create an account</a>
        </p>
    </section>
</main>
</body>
</html>
