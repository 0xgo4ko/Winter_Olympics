<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Profile | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <a class="auth-panel__back" th:href="@{/profile}">Back to profile</a>
        <h1>Delete Profile</h1>

        <p class="message message--error">
            Are you sure you want to delete your profile?
        </p>
        <p class="auth-panel__footer">
            This will delete the account for <strong th:text="${userProfileDto.username}">athlete</strong>
            and log you out.
        </p>

        <form class="auth-form delete-actions" th:action="@{/profile/delete}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="button button--danger" type="submit">Yes, Delete Profile</button>
            <a class="button button--secondary-dark" th:href="@{/profile}">Cancel</a>
        </form>
    </section>
</main>
</body>
</html>
