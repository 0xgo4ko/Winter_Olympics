<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Competition | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel auth-panel--wide">
        <a class="auth-panel__back" th:href="@{/admin/competitions}">Back to competitions</a>
        <h1>Create Competition</h1>

        <p class="message message--error" th:if="${competitionError}" th:text="${competitionError}"></p>

        <form class="auth-form auth-form--grid"
              th:action="@{/admin/competitions/create}"
              th:object="${competitionCreateDto}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field form-field--full" th:if="${#fields.hasGlobalErrors()}">
                <p class="field-error" th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
            </div>
            <div class="form-field form-field--full" th:if="${#fields.hasErrors('skiSlalomConfigurationValid')}">
                <p class="field-error" th:errors="*{skiSlalomConfigurationValid}"></p>
            </div>
            <div class="form-field form-field--full" th:if="${#fields.hasErrors('biathlonConfigurationValid')}">
                <p class="field-error" th:errors="*{biathlonConfigurationValid}"></p>
            </div>

            <div class="form-field">
                <label for="name">Competition name</label>
                <input id="name" th:field="*{name}" type="text" required>
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-field">
                <label for="type">Type</label>
                <select id="type" th:field="*{type}" required>
                    <option value="">Select type</option>
                    <option th:each="typeOption : ${competitionTypes}"
                            th:value="${typeOption}"
                            th:text="${typeOption}">
                    </option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
            </div>

            <div class="form-field">
                <label for="gender">Gender category</label>
                <select id="gender" th:field="*{gender}" required>
                    <option value="">Select gender</option>
                    <option th:each="genderOption : ${genders}"
                            th:value="${genderOption}"
                            th:text="${genderOption}">
                    </option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
            </div>

            <div class="form-field">
                <label for="minimumAge">Minimum age</label>
                <input id="minimumAge" th:field="*{minimumAge}" type="number" min="1" max="100" required>
                <p class="field-error" th:if="${#fields.hasErrors('minimumAge')}" th:errors="*{minimumAge}"></p>
            </div>

            <div class="form-field">
                <label for="registrationDeadline">Registration deadline</label>
                <input id="registrationDeadline" th:field="*{registrationDeadline}" type="date" required>
                <p class="field-error" th:if="${#fields.hasErrors('registrationDeadline')}" th:errors="*{registrationDeadline}"></p>
            </div>

            <div class="form-field">
                <label for="secondRunQualifierCount">Second-run qualifiers</label>
                <input id="secondRunQualifierCount" th:field="*{secondRunQualifierCount}" type="number" min="1" max="100">
                <p class="field-help">Used for ski slalom.</p>
                <p class="field-error" th:if="${#fields.hasErrors('secondRunQualifierCount')}" th:errors="*{secondRunQualifierCount}"></p>
            </div>

            <div class="form-field form-field--full">
                <div class="compact-fields">
                    <div class="form-field">
                        <label for="penaltySecondsPerMiss">Penalty seconds per miss</label>
                        <input id="penaltySecondsPerMiss" th:field="*{penaltySecondsPerMiss}" type="number" min="1" max="3600">
                        <p class="field-help">Used for biathlon.</p>
                        <p class="field-error" th:if="${#fields.hasErrors('penaltySecondsPerMiss')}" th:errors="*{penaltySecondsPerMiss}"></p>
                    </div>
                    <div class="form-field">
                        <label for="numberOfLaps">Laps</label>
                        <input id="numberOfLaps" th:field="*{numberOfLaps}" type="number" min="1" max="100">
                        <p class="field-help">Used for biathlon.</p>
                        <p class="field-error" th:if="${#fields.hasErrors('numberOfLaps')}" th:errors="*{numberOfLaps}"></p>
                    </div>
                    <div class="form-field">
                        <label for="numberOfTargets">Targets</label>
                        <input id="numberOfTargets" th:field="*{numberOfTargets}" type="number" min="1" max="100">
                        <p class="field-help">Used for biathlon.</p>
                        <p class="field-error" th:if="${#fields.hasErrors('numberOfTargets')}" th:errors="*{numberOfTargets}"></p>
                    </div>
                </div>
            </div>

            <button class="button button--success form-submit" type="submit">Create Competition</button>
        </form>
    </section>
</main>
</body>
</html>
