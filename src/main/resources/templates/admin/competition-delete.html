<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Competition | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel">
        <a class="auth-panel__back" th:href="@{/admin/competitions}">Back to competitions</a>
        <h1>Delete Competition</h1>

        <p class="message message--error">
            Are you sure you want to delete this competition?
        </p>
        <p class="auth-panel__footer">
            This will delete <strong th:text="${competition.name}">competition</strong>.
        </p>

        <form class="auth-form delete-actions"
              th:action="@{/admin/competitions/{id}/delete(id=${competition.id})}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="button button--danger" type="submit">Yes, Delete Competition</button>
            <a class="button button--secondary-dark" th:href="@{/admin/competitions}">Cancel</a>
        </form>
    </section>
</main>
</body>
</html>
