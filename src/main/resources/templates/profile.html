<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-panel auth-panel--wide">
        <a class="auth-panel__back" th:href="@{/}">Winter Olympics</a>
        <h1>Profile</h1>

        <p class="message message--success" th:if="${profileSuccess}" th:text="${profileSuccess}"></p>

        <form class="auth-form auth-form--grid" th:action="@{/athlete/profile}" th:object="${userProfileDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field">
                <label for="username">Username</label>
                <input id="username" th:value="*{username}" type="text" disabled>
            </div>

            <div class="form-field">
                <label for="dateOfBirth">Date of birth</label>
                <input id="dateOfBirth" th:value="*{dateOfBirth}" type="date" disabled>
            </div>

            <div class="form-field">
                <label for="fullName">Full name</label>
                <input id="fullName" th:field="*{fullName}" type="text" autocomplete="name" required>
                <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div class="form-field">
                <label for="country">Country</label>
                <input id="country" th:field="*{country}" type="text" autocomplete="country-name" required>
                <p class="field-error" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></p>
            </div>

            <div class="form-field">
                <label for="gender">Gender</label>
                <select id="gender" th:field="*{gender}" required>
                    <option th:each="genderOption : ${genders}"
                            th:value="${genderOption}"
                            th:text="${genderOption}">
                    </option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
            </div>

            <button class="button button--primary form-submit" type="submit">Save Changes</button>
        </form>

        <div class="danger-zone">
            <h2>Delete profile</h2>
            <p>This removes your athlete account from the system.</p>
            <a class="button button--danger" th:href="@{/athlete/profile/delete}">Delete Profile</a>
        </div>
    </section>
</main>
</body>
</html>
